<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
        <meta name="theme-color" content="#F4F6F8" />
        <meta name="referrer" content="no-referrer" />
        <meta name="description" content="Assistente de IA avançado" />
        <meta name="keywords" content="IA, chatbot, assistente, inteligência artificial" />
        <title>AI Chat</title>

        <script>
            const initTheme = () => {
                const metaThemeColorTag = document.querySelector('meta[name="theme-color"]');
                const prefersTheme = 'light';

                if (!localStorage?.theme) {
                    localStorage.theme = prefersTheme;
                }

                if (localStorage.theme === 'system') {
                    document.documentElement.classList.add(prefersTheme);
                    metaThemeColorTag.setAttribute('content', prefersTheme === 'light' ? '#F4F6F8' : '#141618');
                } else if (localStorage.theme === 'light') {
                    document.documentElement.classList.add('light');
                    metaThemeColorTag.setAttribute('content', '#F4F6F8');
                } else {
                    document.documentElement.classList.add('dark');
                    metaThemeColorTag.setAttribute('content', '#141618');
                }
            };
            initTheme();
        </script>

        <style>
            @keyframes pulse {
                50% {
                    opacity: 0.65;
                }
            }
            .animate-pulse-fast {
                animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            }
        </style>
    </head>

    <body>
        <div id="app" style="display: contents"></div>
    </body>
</html>
